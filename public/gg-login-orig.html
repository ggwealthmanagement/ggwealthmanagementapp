<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G&G Wealth Management</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:      #080808;
    --card:       #141414;
    --gold:       #C9A84C;
    --gold-light: #E2C472;
    --gold-dim:   #7A6230;
    --white:      #F0EDE8;
    --muted:      #6A6560;
    --border:     rgba(201,168,76,0.2);
  }

  html, body {
    height: 100%;
    background: var(--black);
    font-family: 'Inter', sans-serif;
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* Sparkle canvas sits behind everything */
  #sparkle-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 36px 80px;
  }

  /* ── Brand ── */
  .brand-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 48px;
    animation: fadeDown 0.9s ease both;
  }

  .brand-script {
    font-family: 'Alex Brush', cursive;
    font-size: 54px;
    color: var(--gold);
    line-height: 1.1;
    text-shadow: 0 0 32px rgba(201,168,76,0.22);
    letter-spacing: 0.02em;
  }

  .brand-sub {
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-top: 10px;
    font-weight: 300;
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 34px;
    animation: fadeUp 0.9s ease 0.1s both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent);
  }
  .divider span { color: var(--gold-dim); font-size: 10px; opacity: 0.65; }

  /* ── Form ── */
  .form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 18px;
    animation: fadeUp 0.9s ease 0.2s both;
  }

  .field { display: flex; flex-direction: column; gap: 7px; }

  label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-weight: 500;
  }

  input {
    background: #0E0E0E;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 300;
    padding: 15px 18px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    width: 100%;
  }
  input::placeholder { color: var(--muted); font-size: 13px; }
  input:focus {
    border-color: rgba(201,168,76,0.55);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.05);
  }

  /* ── Sign In button with shimmer ── */
  .btn-wrap {
    margin-top: 6px;
    position: relative;
    border-radius: 6px;
    overflow: hidden;
  }

  .btn-login {
    position: relative;
    z-index: 1;
    width: 100%;
    background: linear-gradient(135deg, #9A7A2E 0%, #C9A84C 30%, #E2C472 50%, #C9A84C 70%, #9A7A2E 100%);
    background-size: 300% 100%;
    border: none;
    border-radius: 6px;
    color: #060606;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    padding: 17px;
    animation: btnShimmer 3s ease-in-out infinite;
    transition: transform 0.15s, box-shadow 0.2s;
    overflow: hidden;
  }

  /* Sweeping light overlay */
  .btn-login::after {
    content: '';
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
      120deg,
      transparent 0%,
      rgba(255,255,255,0.18) 50%,
      transparent 100%
    );
    animation: btnSweep 3s ease-in-out infinite;
    border-radius: 6px;
  }

  @keyframes btnShimmer {
    0%   { background-position: 100% 0; box-shadow: 0 0 8px rgba(201,168,76,0.25); }
    50%  { background-position: 0% 0;   box-shadow: 0 0 22px rgba(226,196,114,0.45); }
    100% { background-position: 100% 0; box-shadow: 0 0 8px rgba(201,168,76,0.25); }
  }

  @keyframes btnSweep {
    0%   { left: -75%; opacity: 0; }
    20%  { opacity: 1; }
    60%  { left: 130%; opacity: 0.6; }
    100% { left: 130%; opacity: 0; }
  }

  .btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 28px rgba(226,196,114,0.5) !important;
    animation-play-state: paused;
  }
  .btn-login:active { transform: translateY(0); }

  /* ── Forgot ── */
  .forgot {
    text-align: center;
    margin-top: 22px;
    font-size: 12px;
    color: var(--muted);
    animation: fadeUp 0.9s ease 0.3s both;
  }
  .forgot a { color: var(--gold-dim); text-decoration: none; transition: color 0.2s; }
  .forgot a:hover { color: var(--gold); }

  /* ── Footer ── */
  .footer {
    position: fixed;
    bottom: 26px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--gold-dim);
    opacity: 0.35;
    text-transform: uppercase;
    z-index: 1;
    pointer-events: none;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<canvas id="sparkle-canvas"></canvas>

<div class="screen">

  <div class="brand-wrap">
    <div class="brand-script">G&amp;G</div>
    <div class="brand-sub">Wealth Management</div>
  </div>

  <div class="divider"><span>◆</span></div>

  <form class="form" onsubmit="return false;">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <div class="btn-wrap">
      <button class="btn-login" type="submit">Sign In</button>
    </div>
  </form>

  <p class="forgot">Need help? <a href="#">Contact your coach</a></p>

</div>

<div class="footer">Confidential &nbsp;·&nbsp; G&amp;G Wealth Management</div>

<script>
// ── Sparkle canvas ──
const canvas = document.getElementById('sparkle-canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = [
  'rgba(226,196,114,',
  'rgba(201,168,76,',
  'rgba(240,237,232,',
  'rgba(255,220,120,',
];

class Sparkle {
  constructor() { this.reset(true); }
  reset(init = false) {
    this.x         = Math.random() * canvas.width;
    this.y         = Math.random() * canvas.height;
    this.size      = Math.random() * 1.6 + 0.4;
    this.baseAlpha = Math.random() * 0.55 + 0.1;
    this.alpha     = this.baseAlpha;
    this.phase     = Math.random() * Math.PI * 2;
    this.speed     = Math.random() * 0.018 + 0.008;
    this.color     = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.arms      = Math.random() > 0.6;
  }
  update() {
    this.phase += this.speed;
    this.alpha  = this.baseAlpha * (0.4 + 0.6 * Math.abs(Math.sin(this.phase)));
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    if (this.arms) {
      ctx.strokeStyle = this.color + this.alpha + ')';
      ctx.lineWidth   = this.size * 0.5;
      ctx.lineCap     = 'round';
      const s = this.size * 3;
      ctx.beginPath();
      ctx.moveTo(this.x - s, this.y);
      ctx.lineTo(this.x + s, this.y);
      ctx.moveTo(this.x, this.y - s);
      ctx.lineTo(this.x, this.y + s);
      ctx.stroke();
      ctx.globalAlpha = this.alpha * 0.35;
      const d = s * 0.55;
      ctx.beginPath();
      ctx.moveTo(this.x - d, this.y - d);
      ctx.lineTo(this.x + d, this.y + d);
      ctx.moveTo(this.x + d, this.y - d);
      ctx.lineTo(this.x - d, this.y + d);
      ctx.stroke();
    } else {
      ctx.fillStyle = this.color + '1)';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

const sparkles = Array.from({ length: 90 }, () => new Sparkle());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  sparkles.forEach(s => { s.update(); s.draw(); });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
