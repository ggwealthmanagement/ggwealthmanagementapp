<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G&G — Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --black:#080808; --card:#111111; --card2:#181818;
    --gold:#C9A84C; --gold-light:#E2C472; --gold-dim:#7A6230;
    --white:#F0EDE8; --muted:#5A5550; --border:rgba(201,168,76,0.15);
    --savings:#1A5C2E;
  }
  html,body { background:var(--black); font-family:'Inter',sans-serif; color:var(--white); min-height:100vh; display:flex; justify-content:center;  overscroll-behavior-x:none;}
  #sparkle-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.35; }
  .app { position:relative; z-index:1; width:100%; max-width:390px; min-height:100vh; display:flex; flex-direction:column; }

  /* Header */
  .header { padding:52px 24px 16px; }
  .page-title { font-family:'Alex Brush',cursive; font-size:36px; color:var(--gold); line-height:1; }
  .page-sub   { font-size:10px; color:var(--muted); letter-spacing:0.14em; text-transform:uppercase; margin-top:2px; }

  /* Coach info card */
  .coach-card {
    margin:0 20px 16px;
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:16px 18px;
    display:flex; align-items:center; gap:14px;
  }
  .coach-avatar {
    width:48px; height:48px; border-radius:50%;
    background:linear-gradient(135deg,#B8923E,#E2C472);
    display:flex; align-items:center; justify-content:center;
    font-family:'Alex Brush',cursive; font-size:22px; color:#080808;
    flex-shrink:0; box-shadow:0 0 14px rgba(201,168,76,0.3);
  }
  .coach-info { flex:1; }
  .coach-name { font-size:14px; font-weight:600; color:var(--white); margin-bottom:3px; }
  .coach-title { font-size:10px; color:var(--muted); letter-spacing:0.08em; }
  .online-dot { display:flex; align-items:center; gap:5px; margin-top:5px; }
  .dot { width:7px; height:7px; border-radius:50%; background:#3DAA68; animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .online-text { font-size:9px; color:#3DAA68; letter-spacing:0.1em; text-transform:uppercase; }

  /* Chat area */
  .chat-area {
    flex:1; overflow-y:auto; padding:0 20px 16px;
    display:flex; flex-direction:column; gap:12px;
    padding-bottom:140px;
    scrollbar-width:none;
  }
  .chat-area::-webkit-scrollbar { display:none; }

  /* Date stamp */
  .date-stamp {
    text-align:center; font-size:9px; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--muted);
    margin:6px 0; opacity:0.6;
  }

  /* Messages */
  .msg-row { display:flex; flex-direction:column; gap:3px; }
  .msg-row.from-coach { align-items:flex-start; }
  .msg-row.from-client  { align-items:flex-end; }

  .msg-bubble {
    max-width:78%; padding:12px 15px;
    border-radius:16px; font-size:13px; line-height:1.55;
    animation:popIn 0.3s ease both;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

  /* Coach bubble — gold tinted */
  .msg-row.from-coach .msg-bubble {
    background:var(--card2); border:1px solid var(--border);
    color:var(--white); border-radius:4px 16px 16px 16px;
  }

  /* Client bubble — gold accent */
  .msg-row.from-client .msg-bubble {
    background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.22);
    color:var(--white); border-radius:16px 4px 16px 16px;
  }

  .msg-time {
    font-size:9px; color:var(--muted);
    padding:0 4px; letter-spacing:0.06em;
  }

  /* Sender label */
  .msg-sender {
    font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--gold-dim); padding:0 4px; margin-bottom:2px;
  }

  /* Pinned note */
  .pinned-note {
    background:rgba(201,168,76,0.07); border:1px solid rgba(201,168,76,0.2);
    border-left:3px solid var(--gold); border-radius:10px;
    padding:12px 14px; margin-bottom:4px;
  }
  .pin-label { font-size:8px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:6px; display:flex; align-items:center; gap:5px; }
  .pin-text  { font-size:12px; color:var(--white); line-height:1.6; }

  /* Input bar */
  .input-bar {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:390px;
    background:rgba(8,8,8,0.97); border-top:1px solid var(--border);
    padding:12px 16px 28px;
    display:flex; align-items:flex-end; gap:10px;
    backdrop-filter:blur(12px); z-index:10;
  }

  .input-wrap {
    flex:1; background:var(--card); border:1px solid var(--border);
    border-radius:22px; padding:10px 16px;
    display:flex; align-items:center;
    transition:border-color 0.2s;
  }
  .input-wrap:focus-within { border-color:rgba(201,168,76,0.4); }

  .msg-input {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--white); font-family:'Inter',sans-serif;
    font-size:14px; resize:none; max-height:100px;
    scrollbar-width:none; line-height:1.4;
  }
  .msg-input::placeholder { color:var(--muted); }

  .send-btn {
    width:42px; height:42px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg,#B8923E,#E2C472,#B8923E);
    background-size:200%; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:18px;
    animation:sendGlow 3s ease-in-out infinite;
    transition:transform 0.15s;
  }
  .send-btn:hover { transform:scale(1.07); }
  @keyframes sendGlow { 0%,100%{box-shadow:0 0 8px rgba(201,168,76,0.3);background-position:0%} 50%{box-shadow:0 0 18px rgba(226,196,114,0.5);background-position:100%} }
</style>
<script defer src="/theme.js"></script>
<script src="/coach-mode.js"></script>
<script defer src="/swipe-lock.js"></script>
<script defer src="/nav-notify.js"></script>
</head>
<body>
<canvas id="sparkle-canvas"></canvas>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <button onclick="goHome()" style="background:none;border:none;color:var(--gold);font-size:28px;cursor:pointer;padding:0 6px 0 0;line-height:1;flex-shrink:0">‹</button>
      <div>
        <div class="page-title">My Coach</div>
        <div class="page-sub">G&amp;G Wealth Management</div>
      </div>
    </div>
  </div>

  <!-- Coach card -->
  <div class="coach-card">
    <div class="coach-avatar">G&amp;G</div>
    <div class="coach-info">
      <div class="coach-name">Gustavo &amp; Greys</div>
      <div class="coach-title">G&amp;G Wealth Management · Your Financial Coaches</div>
      <div class="online-dot"><div class="dot"></div><span class="online-text">Active</span></div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chat-area">
    <!-- Messages loaded from API -->
  </div>

</div>

<!-- Input bar -->
<div class="input-bar">
  <div class="input-wrap">
    <textarea class="msg-input" id="msg-input" placeholder="Message your coach..." rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
// Auth guard
fetch('/api/me').then(r => { if(!r.ok && !window._coachMode) window.location='/gg-login.html'; });

let currentUser = null;

function fmtTime(ts) {
  if (!ts) return '';
  // SQLite returns 'YYYY-MM-DD HH:MM:SS' — replace space with T for reliable cross-browser parsing
  const d = new Date(ts.replace(' ', 'T'));
  if (isNaN(d)) return ts;
  const now = new Date();
  const todayStr = now.toDateString();
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  const timeStr = d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  if (d.toDateString() === todayStr) return timeStr;
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday · ' + timeStr;
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' · ' + timeStr;
}

function renderMessage(msg) {
  const isMe = currentUser && msg.from_id === currentUser.id;
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMe ? 'from-client' : 'from-coach');
  row.innerHTML = `
    ${!isMe ? '<div class="msg-sender">Gustavo &amp; Greys</div>' : ''}
    <div class="msg-bubble">${(msg.text||msg.body||'').replace(/</g,'&lt;')}</div>
    <div class="msg-time">${fmtTime(msg.created_at)}</div>`;
  return row;
}

async function loadMessages() {
  const [meRes, msgRes] = await Promise.all([fetch('/api/me'), fetch('/api/messages')]);
  if(!meRes.ok && !window._coachMode) { window.location='/gg-login.html'; return; }
  currentUser = await meRes.json();
  const messages = await msgRes.json();
  const chat = document.getElementById('chat-area');
  chat.innerHTML = '';
  messages.forEach(m => chat.appendChild(renderMessage(m)));
  chat.scrollTop = chat.scrollHeight;
  // Mark all coach messages as read
  localStorage.setItem('gg_msg_read_ts', Date.now().toString());
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input  = document.getElementById('msg-input');
  const sendBtn = document.querySelector('.send-btn');
  const text   = input.value.trim();
  if(!text) return;
  input.value = '';
  input.style.height = 'auto';

  // Disable send button while in flight
  if(sendBtn) sendBtn.style.opacity = '0.5';

  try {
    const res = await fetch('/api/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text: text})
    });
    if(res.ok) {
      const msg = await res.json();
      const chat = document.getElementById('chat-area');
      chat.appendChild(renderMessage(msg));
      chat.scrollTop = chat.scrollHeight;
    } else {
      const err = await res.text();
      input.value = text; // restore so client can retry
      showMsgError('Could not send — ' + err);
    }
  } catch(e) {
    input.value = text;
    showMsgError('Network error. Is the server running?');
  } finally {
    if(sendBtn) sendBtn.style.opacity = '1';
  }
}

function showMsgError(msg) {
  var chat = document.getElementById('chat-area');
  var el = document.createElement('div');
  el.style.cssText = 'text-align:center;color:#E05555;font-size:10px;padding:4px;animation:fadeIn 0.3s ease';
  el.textContent = '⚠ ' + msg;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 5000);
}

// Load on start
loadMessages();
// Poll for new messages every 15 s so client sees coach replies
setInterval(loadMessages, 15000);

function goHome() {
  var qs = window._coachMode
    ? '?clientId='+encodeURIComponent(window._coachClientId)+'&clientName='+encodeURIComponent(window._coachClientName)
    : '';
  window.location = '/gg-home.html' + qs;
}

// Sparkle
const canvas=document.getElementById('sparkle-canvas'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const SC=['rgba(226,196,114,','rgba(201,168,76,','rgba(240,237,232,'];
class Sparkle{constructor(){this.reset();}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.size=Math.random()*1.3+0.3;this.ba=Math.random()*0.4+0.07;this.a=this.ba;this.ph=Math.random()*Math.PI*2;this.sp=Math.random()*0.015+0.006;this.c=SC[Math.floor(Math.random()*SC.length)];this.arms=Math.random()>0.65;}update(){this.ph+=this.sp;this.a=this.ba*(0.4+0.6*Math.abs(Math.sin(this.ph)));}draw(){ctx.save();ctx.globalAlpha=this.a;if(this.arms){ctx.strokeStyle=this.c+this.a+')';ctx.lineWidth=this.size*0.5;ctx.lineCap='round';const s=this.size*3;ctx.beginPath();ctx.moveTo(this.x-s,this.y);ctx.lineTo(this.x+s,this.y);ctx.moveTo(this.x,this.y-s);ctx.lineTo(this.x,this.y+s);ctx.stroke();}else{ctx.fillStyle=this.c+'1)';ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();}ctx.restore();}}
const SP=Array.from({length:60},()=>new Sparkle());
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);SP.forEach(s=>{s.update();s.draw();});requestAnimationFrame(animate);}
animate();
</script>

<!-- ── User Menu ── -->
<div id="umBtn" onclick="toggleUM()" style="position:fixed;top:14px;right:18px;z-index:100;width:34px;height:34px;border-radius:50%;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;font-weight:600;color:#C9A84C;font-family:Inter,sans-serif;letter-spacing:0;user-select:none"></div>
<div id="umOverlay" onclick="if(event.target===this)toggleUM()" style="display:none;position:fixed;inset:0;background:rgba(8,8,8,0.78);z-index:200;align-items:center;justify-content:center;padding:0 20px">
  <div style="background:#141414;border:1px solid rgba(201,168,76,0.22);border-radius:16px;padding:22px 20px;width:100%;max-width:350px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      <div id="umAvatar" style="width:42px;height:42px;border-radius:50%;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#C9A84C;font-family:Inter,sans-serif;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div id="umName" style="font-size:15px;font-weight:600;color:#F0EDE8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
        <div id="umRole" style="font-size:10px;color:#5A5550;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px"></div>
      </div>
      <div onclick="toggleUM()" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:#5A5550;flex-shrink:0">✕</div>
    </div>
    <div style="height:1px;background:rgba(201,168,76,0.1);margin-bottom:16px"></div>
    <button id="umThemeBtn" onclick="toggleTheme()" style="width:100%;padding:13px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:10px;color:#C9A84C;font-family:Inter,sans-serif;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:0.04em;margin-bottom:8px">☀️  Light Mode</button>
    <button onclick="doLogout()" style="width:100%;padding:13px;background:rgba(139,26,26,0.12);border:1px solid rgba(255,107,107,0.2);border-radius:10px;color:#FF6B6B;font-family:Inter,sans-serif;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:0.04em">↩ &nbsp;Sign Out</button>
  </div>
</div>
<script>
function toggleUM(){var o=document.getElementById("umOverlay");o.style.display=o.style.display==="flex"?"none":"flex";}
async function doLogout(){await fetch("/api/logout",{method:"POST"});window.location="/gg-login.html";}
fetch("/api/me").then(r=>r.json()).then(u=>{
  var initials=(u.name||u.username||"?").split(" ").map(function(w){return w[0];}).join("").toUpperCase().slice(0,2);
  var btn=document.getElementById("umBtn");if(btn)btn.textContent=initials;
  var av=document.getElementById("umAvatar");if(av)av.textContent=initials;
  var nm=document.getElementById("umName");if(nm)nm.textContent=u.name||u.username;
  var rl=document.getElementById("umRole");if(rl)rl.textContent=u.role==="coach"?"Financial Coach · G&G":"Budgeting Client";
}).catch(function(){});
</script>
</body>
</html>
